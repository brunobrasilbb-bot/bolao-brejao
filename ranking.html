    window.init = async function() {
      const c = document.getElementById('ranking-container');
      c.innerHTML = '<p class="loading">Carregando...</p>';
      const currentUser = getUser();

      const [resSnap, palSnap, usersSnap] = await Promise.all([
        getDocs(collection(db, 'resultados')),
        getDocs(collection(db, 'palpites')),
        getDocs(collection(db, 'usuarios')),
      ]);

      const resultados = {};
      resSnap.forEach(d => { resultados[d.id] = d.data(); });

      // Build palpites map by userId
      const palpitesMap = {};
      palSnap.forEach(d => { palpitesMap[d.id] = d.data(); });

      // Get all registered users
      const allUsers = [];
      usersSnap.forEach(d => { allUsers.push({ id: d.id, ...d.data() }); });

      if (allUsers.length === 0) {
        c.innerHTML = '<p class="empty">Nenhum participante ainda. Seja o primeiro!</p>';
        return;
      }

      // Merge users with their palpites
      const allPalpites = allUsers.map(u => ({ ...palpitesMap[u.id], id: u.id, nome: u.nome, userId: u.id }));

      const ranked = allPalpites.map(pal => {
        let pts = 0, exact = 0, win = 0, count = 0;
        MATCHES.forEach(m => {
          const res = resultados[m.id];
          if (!res) return;
          const p = pal[m.id];
          if (!p || p.home === undefined) return;
          count++;
                  if (p.home===res.home && p.away===res.away) {
            pts+=25; exact++;
          } else {
            const acertouVencedor = (p.home>p.away&&res.home>res.away)||(p.home<p.away&&res.home<res.away)||(p.home===p.away&&res.home===res.away);
            if (acertouVencedor) {
              const acertouGolsHome = p.home===res.home;
              const acertouGolsAway = p.away===res.away;
              const acertouDiff = (p.home-p.away)===(res.home-res.away);
              if (acertouGolsHome || acertouGolsAway) { pts+=18; win++; }
              else if (acertouDiff) { pts+=15; win++; }
              else { pts+=12; win++; }
            }
          }
        });
        return { nome: pal.nome || pal.userId, email: pal.userId, pts, exact, win, count };
      }).sort((a, b) => b.pts - a.pts || b.exact - a.exact);

      const medals = ['🥇', '🥈', '🥉'];
      let html = `<table class="ranking-table">
        <thead><tr><th>#</th><th>Participante</th><th>Palpites</th><th>Vencedores</th><th>Exatos</th><th>Pontos</th></tr></thead>
        <tbody>`;

      ranked.forEach((u, i) => {
        const isMe = currentUser && u.email === currentUser.id;
        html += `<tr class="${isMe ? 'my-row' : ''}">
          <td class="pos">${medals[i] || (i + 1)}</td>
          <td class="nome">${u.nome}${isMe ? ' <span class="you-tag">(você)</span>' : ''}</td>
          <td>${u.count}</td>
          <td>${u.win}</td>
          <td>${u.exact}</td>
          <td><span class="pts-badge">${u.pts}</span></td>
        </tr>`;
      });

      html += '</tbody></table>';
      c.innerHTML = html;
    };

    init();
  </script>
