      { id:"o6", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"13/07", group:"Oitavas 6", phase:"Oitavas de Final" },
      { id:"o7", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"14/07", group:"Oitavas 7", phase:"Oitavas de Final" },
      { id:"o8", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"14/07", group:"Oitavas 8", phase:"Oitavas de Final" },
      { id:"q1", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"17/07", group:"Quartas 1", phase:"Quartas de Final" },
      { id:"q2", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"17/07", group:"Quartas 2", phase:"Quartas de Final" },
      { id:"q3", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"18/07", group:"Quartas 3", phase:"Quartas de Final" },
      { id:"q4", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"18/07", group:"Quartas 4", phase:"Quartas de Final" },
      { id:"s1", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"15/07", group:"Semifinal 1", phase:"Semifinais" },
      { id:"s2", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"16/07", group:"Semifinal 2", phase:"Semifinais" },
      { id:"f1", home:"A definir", homeFlag:"🏳️", away:"A definir", awayFlag:"🏳️", date:"19/07 16h", group:"🏆 FINAL", phase:"Final" },
    ];

    async function loadResultados() {
      const snap = await getDocs(collection(db, 'resultados'));
      resultados = {};
      snap.forEach(d => { resultados[d.id] = d.data(); });
    }

    function renderFilter() {
      const c = document.getElementById('phase-filter');
      c.innerHTML = PHASES.map(p =>
        `<button class="filter-btn ${p===currentPhase?'active':''}" onclick="setPhase('${p}')">${p}</button>`
      ).join('');
    }

    window.setPhase = function(p) { currentPhase = p; renderFilter(); renderMatches(); };

    function renderMatches() {
      const c = document.getElementById('admin-matches');
      c.innerHTML = '';
      MATCHES.filter(m => m.phase === currentPhase).forEach(m => {
        const res = resultados[m.id];
        const div = document.createElement('div');
        div.className = 'match-card';
        div.innerHTML = `
          <div class="match-head">
            <span class="match-group">${m.group}</span>
            <span class="match-date">${m.date}</span>
            ${res ? '<span class="badge-done">✅ Salvo: '+res.home+' × '+res.away+'</span>' : '<span class="badge-open">Aguardando</span>'}
          </div>
          <div class="match-teams">
            <div class="team"><div class="flag">${m.homeFlag}</div><div class="name">${m.home}</div></div>
            <div class="score-inputs">
              <input type="number" min="0" max="20" step="1" value="${res?res.home:''}" id="rh-${m.id}" placeholder="0" />
              <span class="vs-x">×</span>
              <input type="number" min="0" max="20" step="1" value="${res?res.away:''}" id="ra-${m.id}" placeholder="0" />
            </div>
            <div class="team"><div class="flag">${m.awayFlag}</div><div class="name">${m.away}</div></div>
          </div>
          <button class="btn-save-res" onclick="salvarResultado('${m.id}')">💾 Salvar resultado</button>
        `;
        c.appendChild(div);
      });
    }

    window.salvarResultado = async function(id) {
      const h = document.getElementById('rh-'+id);
      const a = document.getElementById('ra-'+id);
      if (!h||!a||h.value===''||a.value==='') { alert('Preencha os dois placares!'); return; }
      await setDoc(doc(db,'resultados',id), { home: parseInt(h.value), away: parseInt(a.value), savedAt: new Date().toISOString() });
      resultados[id] = { home: parseInt(h.value), away: parseInt(a.value) };
      renderMatches();
      alert('Resultado salvo! ✅');
    };

    // AUTO SYNC from openfootball
    window.syncResultados = async function() {
      const status = document.getElementById('sync-status');
      status.innerHTML = '<div class="sync-msg info">🔄 Buscando resultados na internet...</div>';
      try {
        const res = await fetch('https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json');
        const data = await res.json();
        let salvos = 0;
        for (const match of data.matches) {
          if (!match.score) continue; // sem resultado ainda
          const key1 = match.team1+'|'+match.team2;
          const key2 = match.team2+'|'+match.team1;
          const id = TEAM_TO_ID[key1] || TEAM_TO_ID[key2];
          if (!id) continue;
          // score format: "2:1" or "1:0 (a.e.t.)"
          const scoreStr = match.score.replace(/\s*\(.*\)/, '').trim();
          const parts = scoreStr.split(':');
          if (parts.length !== 2) continue;
          const home = parseInt(parts[0]);
          const away = parseInt(parts[1]);
          if (isNaN(home)||isNaN(away)) continue;
          await setDoc(doc(db,'resultados',id), { home, away, savedAt: new Date().toISOString(), auto: true });
          resultados[id] = { home, away };
          salvos++;
        }
        status.innerHTML = salvos > 0
          ? `<div class="sync-msg success">✅ ${salvos} resultado(s) importado(s) com sucesso!</div>`
          : `<div class="sync-msg warn">⚠️ Nenhum resultado novo encontrado ainda. Os jogos ainda não começaram ou a fonte ainda não atualizou.</div>`;
        renderMatches();
      } catch(e) {
        status.innerHTML = '<div class="sync-msg error">❌ Erro ao buscar resultados. Verifique sua conexão e tente de novo.</div>';
      }
    };

    async function init() {
      await loadResultados();
      renderFilter();
      renderMatches();
    }
    init();
  </script>
</body>
</html>
